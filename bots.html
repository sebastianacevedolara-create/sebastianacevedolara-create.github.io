<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bitácora de Bots Infinity Grid</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0a0a0c; --surface: #15151a; --surface2: #1d1d23; --surface3: #26262e;
    --border: #2a2a30; --text: #f2f2f0; --muted: #97978f; --hint: #66665f;
    --green: #4ec88f; --green-dim: #1f5c40; --green-bg: #14241c;
    --blue: #5b9bd5; --blue-dim: #2e5277;
    --amber: #e0a84e; --amber-bg: #2a2210; --red: #e0664e; --red-bg: #2a1612;
  }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 14px; max-width: 640px; margin: 0 auto; padding-bottom: 60px; line-height: 1.45; }
  h1 { font-size: 19px; font-weight: 700; margin-bottom: 2px; }
  .sub { font-size: 12px; color: var(--muted); margin-bottom: 16px; }

  /* Resumen */
  .resumen { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 18px; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 11px 10px; text-align: center; }
  .stat .lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 3px; }
  .stat .val { font-size: 17px; font-weight: 700; }

  .sec-title { font-size: 11px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; font-weight: 700; margin: 22px 0 10px; display: flex; align-items: center; gap: 8px; }
  .sec-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* Botones */
  .btn { border: none; border-radius: 10px; font-size: 14px; font-weight: 600; padding: 11px 16px; cursor: pointer; font-family: inherit; transition: opacity 0.15s; }
  .btn:active { opacity: 0.7; }
  .btn-primary { background: var(--green); color: #0a0a0c; width: 100%; }
  .btn-blue { background: var(--blue); color: #0a0a0c; }
  .btn-ghost { background: var(--surface3); color: var(--text); }
  .btn-danger { background: var(--red-bg); color: var(--red); }
  .btn-sm { font-size: 12px; padding: 7px 12px; }

  /* Tarjeta de bot */
  .bot { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 11px; border-left: 3px solid var(--green); }
  .bot.cerrado { border-left-color: var(--hint); opacity: 0.92; }
  .bot-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .bot-name { font-size: 16px; font-weight: 700; }
  .bot-date { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .badge { font-size: 10px; padding: 3px 9px; border-radius: 6px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em; }
  .badge-activo { background: var(--green-bg); color: var(--green); }
  .badge-cerrado { background: var(--surface3); color: var(--muted); }
  .badge-cargado { background: var(--green-bg); color: var(--green); }
  .badge-descargado { background: var(--amber-bg); color: var(--amber); }

  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 14px; margin: 10px 0; }
  .field { }
  .field .k { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.03em; }
  .field .v { font-size: 14px; font-weight: 600; margin-top: 1px; }
  .v.green { color: var(--green); } .v.red { color: var(--red); }

  .ganancia-box { background: var(--surface2); border-radius: 10px; padding: 10px 12px; margin: 10px 0; }
  .ganancia-row { display: flex; justify-content: space-between; font-size: 13px; padding: 3px 0; }
  .ganancia-row .lbl { color: var(--muted); }
  .nota { font-size: 12px; color: var(--muted); font-style: italic; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
  .bot-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }

  /* Modal / formulario */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100; padding: 16px; overflow-y: auto; }
  .overlay.show { display: flex; align-items: flex-start; justify-content: center; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 18px; width: 100%; max-width: 480px; margin-top: 20px; }
  .modal h2 { font-size: 17px; margin-bottom: 14px; }
  .form-group { margin-bottom: 12px; }
  .form-group label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; font-weight: 600; }
  .form-group input, .form-group textarea, .form-group select { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 9px; padding: 10px 12px; color: var(--text); font-size: 15px; font-family: inherit; }
  .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--green); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-actions { display: flex; gap: 10px; margin-top: 18px; }
  .form-actions .btn { flex: 1; }
  .calc-hint { font-size: 11px; color: var(--green); margin-top: 4px; }

  .empty { text-align: center; color: var(--hint); font-size: 13px; padding: 30px 20px; background: var(--surface); border-radius: 12px; border: 1px dashed var(--border); }
  .loading { text-align: center; color: var(--muted); padding: 20px; font-size: 13px; }
</style>
</head>
<body>

<h1>Bitácora de Bots</h1>
<p class="sub">Infinity Grid · ETH/USDT · registro de aperturas, estado y cierres</p>

<div class="resumen" id="resumen">
  <div class="stat"><div class="lbl">Activos</div><div class="val" id="stat-activos">—</div></div>
  <div class="stat"><div class="lbl">Capital</div><div class="val" id="stat-capital">—</div></div>
  <div class="stat"><div class="lbl">Ganancia</div><div class="val" id="stat-ganancia">—</div></div>
</div>

<button class="btn btn-primary" onclick="abrirForm()">+ Registrar bot nuevo</button>

<div class="sec-title">Bots activos</div>
<div id="lista-activos"><div class="loading">Cargando…</div></div>

<div class="sec-title">Historial (cerrados)</div>
<div id="lista-cerrados"></div>

<!-- MODAL FORMULARIO -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="modal-title">Registrar bot nuevo</h2>
    <input type="hidden" id="f-id">
    <div class="form-group">
      <label>Nombre del bot</label>
      <input type="text" id="f-nombre" placeholder="Ej: Bot 3">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Capital (USDT)</label>
        <input type="number" id="f-capital" placeholder="2000" oninput="calcAire()">
      </div>
      <div class="form-group">
        <label>Fecha apertura</label>
        <input type="date" id="f-fecha">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Precio apertura</label>
        <input type="number" id="f-apertura" placeholder="1600" oninput="calcAire()">
      </div>
      <div class="form-group">
        <label>Precio mínimo</label>
        <input type="number" id="f-minimo" placeholder="1280" oninput="calcAire()">
      </div>
    </div>
    <div class="calc-hint" id="aire-hint"></div>
    <div class="form-group">
      <label>Razón de apertura (disparador / SMC)</label>
      <textarea id="f-razon" rows="2" placeholder="Ej: BTC recuperó 55 EMA, ETH selló sobre 1592"></textarea>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="cerrarForm()">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarBot()">Guardar</button>
    </div>
  </div>
</div>

<!-- MODAL ACTUALIZAR ESTADO -->
<div class="overlay" id="overlay-estado">
  <div class="modal">
    <h2>Actualizar estado en vivo</h2>
    <input type="hidden" id="e-id">
    <div class="form-row">
      <div class="form-group">
        <label>Precio actual ETH</label>
        <input type="number" id="e-precio" placeholder="1650">
      </div>
      <div class="form-group">
        <label>Ganancia total (USDT)</label>
        <input type="number" id="e-ganancia" placeholder="35.20">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>De eso, arbitrajes (USDT)</label>
        <input type="number" id="e-arb" placeholder="8.50">
      </div>
      <div class="form-group">
        <label>Estado de carga</label>
        <select id="e-carga">
          <option value="cargado">Cargado (más ventas)</option>
          <option value="descargado">Descargado (más compras)</option>
          <option value="neutral">Neutral</option>
        </select>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="cerrarEstado()">Cancelar</button>
      <button class="btn btn-blue" onclick="guardarEstado()">Actualizar</button>
    </div>
  </div>
</div>

<!-- MODAL CERRAR BOT -->
<div class="overlay" id="overlay-cerrar">
  <div class="modal">
    <h2>Cerrar bot (en verde)</h2>
    <input type="hidden" id="c-id">
    <div class="form-row">
      <div class="form-group">
        <label>Precio de cierre</label>
        <input type="number" id="c-precio" placeholder="1850">
      </div>
      <div class="form-group">
        <label>Fecha cierre</label>
        <input type="date" id="c-fecha">
      </div>
    </div>
    <div class="form-group">
      <label>Ganancia final (USDT)</label>
      <input type="number" id="c-ganancia" placeholder="120.50">
    </div>
    <div class="form-group">
      <label>¿Qué aprendiste? (nota)</label>
      <textarea id="c-nota" rows="2" placeholder="Ej: cerré en resistencia con RSI alto, buen timing"></textarea>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="cerrarCierre()">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarCierre()">Cerrar bot</button>
    </div>
  </div>
</div>

<script>
const KEY = 'bitacora_bots_infinity';
let bots = [];

function cargar() {
  try {
    const r = localStorage.getItem(KEY);
    bots = r ? JSON.parse(r) : [];
  } catch(e) { bots = []; }
  render();
}
function persistir() {
  try { localStorage.setItem(KEY, JSON.stringify(bots)); } catch(e) { console.error(e); }
}

function fmt(n) { return n==null||isNaN(n) ? '—' : '$'+Number(n).toLocaleString('es-CL',{maximumFractionDigits:2}); }
function hoy() { return new Date().toISOString().split('T')[0]; }
function fechaCorta(f) { if(!f) return '—'; const [y,m,d]=f.split('-'); return `${d}/${m}/${y.slice(2)}`; }
function dias(f1,f2) { if(!f1) return 0; const a=new Date(f1), b=f2?new Date(f2):new Date(); return Math.max(0,Math.round((b-a)/86400000)); }

function calcAire() {
  const ap = parseFloat(document.getElementById('f-apertura').value);
  const mn = parseFloat(document.getElementById('f-minimo').value);
  const h = document.getElementById('aire-hint');
  if(ap && mn && ap>mn) {
    const aire = ((ap-mn)/ap*100).toFixed(1);
    h.textContent = `Aire resultante: -${aire}%`;
  } else h.textContent = '';
}

function abrirForm() {
  document.getElementById('modal-title').textContent = 'Registrar bot nuevo';
  document.getElementById('f-id').value = '';
  ['f-nombre','f-capital','f-apertura','f-minimo','f-razon'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-fecha').value = hoy();
  document.getElementById('aire-hint').textContent = '';
  document.getElementById('overlay').classList.add('show');
}
function cerrarForm() { document.getElementById('overlay').classList.remove('show'); }

async function guardarBot() {
  const nombre = document.getElementById('f-nombre').value.trim();
  const capital = parseFloat(document.getElementById('f-capital').value);
  const apertura = parseFloat(document.getElementById('f-apertura').value);
  const minimo = parseFloat(document.getElementById('f-minimo').value);
  if(!nombre || !capital || !apertura) { alert('Completa al menos nombre, capital y precio de apertura'); return; }
  const id = document.getElementById('f-id').value;
  const aire = (apertura && minimo && apertura>minimo) ? ((apertura-minimo)/apertura*100) : null;
  const data = {
    nombre, capital, apertura, minimo,
    aire, fecha: document.getElementById('f-fecha').value,
    razon: document.getElementById('f-razon').value.trim(),
    estado: 'activo',
    precioActual: null, ganancia: null, arbitrajes: null, carga: null,
    cierre: null
  };
  if(id) {
    const i = bots.findIndex(b=>b.id===id);
    bots[i] = {...bots[i], ...data};
  } else {
    data.id = 'b'+Date.now();
    bots.unshift(data);
  }
  persistir(); render(); cerrarForm();
}

function editarEstado(id) {
  const b = bots.find(x=>x.id===id);
  document.getElementById('e-id').value = id;
  document.getElementById('e-precio').value = b.precioActual||'';
  document.getElementById('e-ganancia').value = b.ganancia||'';
  document.getElementById('e-arb').value = b.arbitrajes||'';
  document.getElementById('e-carga').value = b.carga||'cargado';
  document.getElementById('overlay-estado').classList.add('show');
}
function cerrarEstado() { document.getElementById('overlay-estado').classList.remove('show'); }
async function guardarEstado() {
  const id = document.getElementById('e-id').value;
  const i = bots.findIndex(b=>b.id===id);
  bots[i].precioActual = parseFloat(document.getElementById('e-precio').value)||null;
  bots[i].ganancia = parseFloat(document.getElementById('e-ganancia').value)||null;
  bots[i].arbitrajes = parseFloat(document.getElementById('e-arb').value)||null;
  bots[i].carga = document.getElementById('e-carga').value;
  persistir(); render(); cerrarEstado();
}

function abrirCerrar(id) {
  document.getElementById('c-id').value = id;
  document.getElementById('c-precio').value = '';
  document.getElementById('c-ganancia').value = '';
  document.getElementById('c-nota').value = '';
  document.getElementById('c-fecha').value = hoy();
  document.getElementById('overlay-cerrar').classList.add('show');
}
function cerrarCierre() { document.getElementById('overlay-cerrar').classList.remove('show'); }
async function guardarCierre() {
  const id = document.getElementById('c-id').value;
  const i = bots.findIndex(b=>b.id===id);
  const ganancia = parseFloat(document.getElementById('c-ganancia').value);
  if(ganancia < 0) { if(!confirm('La ganancia es negativa. Tu regla es no cerrar en pérdida. ¿Seguro que quieres registrar este cierre?')) return; }
  bots[i].estado = 'cerrado';
  bots[i].cierre = {
    precio: parseFloat(document.getElementById('c-precio').value)||null,
    fecha: document.getElementById('c-fecha').value,
    ganancia: ganancia||0,
    nota: document.getElementById('c-nota').value.trim()
  };
  persistir(); render(); cerrarCierre();
}

async function borrarBot(id) {
  if(!confirm('¿Borrar este bot de la bitácora? No se puede deshacer.')) return;
  bots = bots.filter(b=>b.id!==id);
  persistir(); render();
}

function render() {
  const activos = bots.filter(b=>b.estado==='activo');
  const cerrados = bots.filter(b=>b.estado==='cerrado');

  // Resumen
  document.getElementById('stat-activos').textContent = activos.length;
  const capTotal = activos.reduce((s,b)=>s+(b.capital||0),0);
  document.getElementById('stat-capital').textContent = fmt(capTotal);
  const ganActivos = activos.reduce((s,b)=>s+(b.ganancia||0),0);
  const ganCerrados = cerrados.reduce((s,b)=>s+(b.cierre?.ganancia||0),0);
  const ganTotal = ganActivos + ganCerrados;
  const ge = document.getElementById('stat-ganancia');
  ge.textContent = fmt(ganTotal);
  ge.style.color = ganTotal>=0 ? 'var(--green)' : 'var(--red)';

  // Activos
  const la = document.getElementById('lista-activos');
  if(activos.length===0) {
    la.innerHTML = '<div class="empty">No hay bots activos.<br>Registra uno con el botón de arriba.</div>';
  } else {
    la.innerHTML = activos.map(b=>{
      const d = dias(b.fecha);
      const pnl = (b.ganancia!=null && b.arbitrajes!=null) ? (b.ganancia-b.arbitrajes) : null;
      const cargaBadge = b.carga ? `<span class="badge badge-${b.carga==='cargado'?'cargado':'descargado'}">${b.carga}</span>` : '';
      return `<div class="bot">
        <div class="bot-head">
          <div><div class="bot-name">${b.nombre}</div><div class="bot-date">Abierto ${fechaCorta(b.fecha)} · ${d}d</div></div>
          <span class="badge badge-activo">Activo</span>
        </div>
        <div class="grid2">
          <div class="field"><div class="k">Capital</div><div class="v">${fmt(b.capital)}</div></div>
          <div class="field"><div class="k">Apertura / Mín</div><div class="v">${fmt(b.apertura)} / ${b.minimo?fmt(b.minimo):'—'}</div></div>
          <div class="field"><div class="k">Aire</div><div class="v">${b.aire!=null?'-'+b.aire.toFixed(1)+'%':'—'}</div></div>
          <div class="field"><div class="k">Precio actual</div><div class="v">${b.precioActual?fmt(b.precioActual):'—'}</div></div>
        </div>
        ${b.ganancia!=null ? `<div class="ganancia-box">
          <div class="ganancia-row"><span class="lbl">Ganancia total</span><span style="color:var(--green);font-weight:700">${fmt(b.ganancia)}</span></div>
          ${b.arbitrajes!=null?`<div class="ganancia-row"><span class="lbl">— Arbitrajes</span><span>${fmt(b.arbitrajes)}</span></div>`:''}
          ${pnl!=null?`<div class="ganancia-row"><span class="lbl">— PnL del ETH</span><span>${fmt(pnl)}</span></div>`:''}
          ${cargaBadge?`<div class="ganancia-row" style="margin-top:4px"><span class="lbl">Estado</span>${cargaBadge}</div>`:''}
        </div>`:''}
        ${b.razon?`<div class="nota">📌 ${b.razon}</div>`:''}
        <div class="bot-actions">
          <button class="btn btn-blue btn-sm" onclick="editarEstado('${b.id}')">Actualizar estado</button>
          <button class="btn btn-ghost btn-sm" onclick="abrirCerrar('${b.id}')">Cerrar bot</button>
          <button class="btn btn-danger btn-sm" onclick="borrarBot('${b.id}')">Borrar</button>
        </div>
      </div>`;
    }).join('');
  }

  // Cerrados
  const lc = document.getElementById('lista-cerrados');
  if(cerrados.length===0) {
    lc.innerHTML = '<div class="empty">Aún no hay bots cerrados.</div>';
  } else {
    lc.innerHTML = cerrados.map(b=>{
      const d = dias(b.fecha, b.cierre?.fecha);
      const rend = (b.cierre?.ganancia && b.capital) ? (b.cierre.ganancia/b.capital*100) : null;
      return `<div class="bot cerrado">
        <div class="bot-head">
          <div><div class="bot-name">${b.nombre}</div><div class="bot-date">${fechaCorta(b.fecha)} → ${fechaCorta(b.cierre?.fecha)} · ${d}d</div></div>
          <span class="badge badge-cerrado">Cerrado</span>
        </div>
        <div class="grid2">
          <div class="field"><div class="k">Capital</div><div class="v">${fmt(b.capital)}</div></div>
          <div class="field"><div class="k">Apertura → Cierre</div><div class="v">${fmt(b.apertura)} → ${b.cierre?.precio?fmt(b.cierre.precio):'—'}</div></div>
          <div class="field"><div class="k">Ganancia final</div><div class="v ${b.cierre?.ganancia>=0?'green':'red'}">${fmt(b.cierre?.ganancia)}</div></div>
          <div class="field"><div class="k">Rendimiento</div><div class="v ${rend>=0?'green':'red'}">${rend!=null?(rend>=0?'+':'')+rend.toFixed(1)+'%':'—'}</div></div>
        </div>
        ${b.cierre?.nota?`<div class="nota">💡 ${b.cierre.nota}</div>`:''}
        <div class="bot-actions">
          <button class="btn btn-danger btn-sm" onclick="borrarBot('${b.id}')">Borrar</button>
        </div>
      </div>`;
    }).join('');
  }
}

cargar();
</script>
</body>
</html>
